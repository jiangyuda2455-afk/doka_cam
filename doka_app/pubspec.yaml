name: doka_app
description: A Flutter app inspired by Doka Camera - AI-powered composition assistant and film filters.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.1
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  image: ^4.1.4
  image_picker: ^1.0.7
  photo_manager: ^3.0.0-dev.4
  permission_handler: ^11.1.0
  provider: ^6.1.1
  google_mlkit_image_labeling: ^0.11.0
  google_mlkit_object_detection: ^0.12.0
  google_mlkit_face_detection: ^0.11.0
  google_mlkit_pose_detection: ^0.11.0
  google_mlkit_commons: ^0.7.1
  collection: ^1.18.0
  path: ^1.8.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/luts/
    - assets/frames/
    - assets/models/


